<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment - My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-header">
                <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
                <h1>🧪 Lab Space</h1>
            </div>
            <p>Experiment with new features and ideas</p>
        </header>
        
        <main>
            <div class="feature-container">
                <h2>Experimentation Area</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="alert('Experiment 1: This is a placeholder for your first experiment!')">
                        <div class="feature-icon">🔬</div>
                        <h3>Experiment 1</h3>
                        <p>Click to test your first experimental feature</p>
                        <button class="feature-btn">Run Experiment 1</button>
                    </div>
                    
                    <div class="feature-card" onclick="alert('Experiment 2: This is a placeholder for your second experiment!')">
                        <div class="feature-icon">⚗️</div>
                        <h3>Experiment 2</h3>
                        <p>Click to test your second experimental feature</p>
                        <button class="feature-btn">Run Experiment 2</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
</body>
</html>
