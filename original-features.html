<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original Features - My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-header">
                <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
                <h1>⚡ Original Tools</h1>
            </div>
            <p>Your original features with full functionality</p>
        </header>
        
        <main>
            <!-- Weather Section -->
            <div class="feature-container">
                <h2>🌤️ Weather</h2>
                <div class="input-group">
                    <label for="citySelect">Select City:</label>
                    <select id="citySelect">
                        <option value="london">London, UK</option>
                        <option value="newyork">New York, USA</option>
                        <option value="tokyo">Tokyo, Japan</option>
                        <option value="sydney">Sydney, Australia</option>
                        <option value="cairo">Cairo, Egypt</option>
                    </select>
                    <button id="weatherBtn" onclick="getWeather()">Get Weather</button>
                </div>
                
                <div id="weatherResult" class="result-box"></div>
            </div>
            
            <!-- Get Notes Section -->
            <div class="feature-container">
                <h2>📋 Get Notes</h2>
                <div class="input-group">
                    <button id="getNotesBtn" onclick="getNotes()">Get Last 5 Notes</button>
                </div>
                
                <div id="noteStatus" class="result-box"></div>
            </div>
            
            <!-- Christian History Section -->
            <div class="feature-container">
                <h2>📅 Christian History</h2>
                <div class="input-group">
                    <p>Click the button below to discover what happened on this day in Christian history.</p>
                    <button id="button3Btn" onclick="runButton3()">Get Today's Fact</button>
                </div>
                
                <div id="button3Result" class="result-box"></div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
    
    <!-- Link to JavaScript file with cache-busting -->
    <script src="script.js?t=202607061128"></script>
</body>
</html>
