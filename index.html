<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎛️ My Control Panel</h1>
            <p>Choose a section to get started</p>
        </header>
        
        <main>
            <div class="nav-grid">
                <div class="nav-card" onclick="window.location.href='weather.html'">
                    <div class="nav-icon">🌤️</div>
                    <h2>Weather</h2>
                    <p>Check weather for cities around the world</p>
                    <button class="nav-btn">Go to Weather</button>
                </div>
                
                <div class="nav-card" onclick="window.location.href='notes.html'">
                    <div class="nav-icon">📝</div>
                    <h2>Notes</h2>
                    <p>Send and retrieve your notes</p>
                    <button class="nav-btn">Go to Notes</button>
                </div>
                
                <div class="nav-card" onclick="window.location.href='history.html'">
                    <div class="nav-icon">📅</div>
                    <h2>Christian History</h2>
                    <p>Discover daily facts about Christian martyrs</p>
                    <button class="nav-btn">Go to History</button>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
</body>
</html>
