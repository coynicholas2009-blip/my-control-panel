<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Layout - My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-header">
                <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
                <h1>🆕 Fresh Tools</h1>
            </div>
            <p>A fresh blank two-button layout ready for new features</p>
        </header>
        
        <main>
            <!-- Bitcoin Section -->
            <div class="feature-container">
                <h2>₿ Bitcoin</h2>
                <div class="input-group">
                    <p>Click Submit to get live Bitcoin prices around the world.</p>
                    <button id="btn1" onclick="getBitcoinPrices()">Submit</button>
                </div>
                <div id="btn1Result" class="result-box"></div>
            </div>
            
            <!-- Button 2 Section -->
            <div class="feature-container">
                <h2>⚙️ Button 2</h2>
                <div class="input-group">
                    <p>This button is not yet assigned.</p>
                    <button id="btn2">Submit</button>
                </div>
                <div id="btn2Result" class="result-box"></div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
    <script src="fresh-script.js"></script>
</body>
</html>
