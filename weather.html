<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-header">
                <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
                <h1>🌤️ Weather</h1>
            </div>
            <p>Check weather for cities around the world</p>
        </header>
        
        <main>
            <div class="weather-section">
                <div class="input-group">
                    <label for="citySelect">Select City:</label>
                    <select id="citySelect">
                        <option value="london">London, UK</option>
                        <option value="newyork">New York, USA</option>
                        <option value="tokyo">Tokyo, Japan</option>
                        <option value="sydney">Sydney, Australia</option>
                        <option value="cairo">Cairo, Egypt</option>
                    </select>
                    <button id="weatherBtn" onclick="getWeather()">Get Weather</button>
                </div>
                
                <div id="weatherResult" class="result-box"></div>
            </div>
        </main>
    </div>
    
    <!-- Link to JavaScript file with cache-busting -->
    <script src="script.js?t=202607061128"></script>
</body>
</html>
