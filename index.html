<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎛️ My Control Panel</h1>
            <p>Choose a section to get started</p>
        </header>
        
        <main>
            <!-- Original Features Container -->
            <div class="feature-container">
                <h2>Original Features</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="window.location.href='original-features.html'">
                        <div class="feature-icon">⚡</div>
                        <h3>Original Tools</h3>
                        <p>Access your original three-button layout with weather, send notes, and get notes</p>
                        <button class="feature-btn">Go to Original Features</button>
                    </div>
                </div>
            </div>
            
            <!-- Fresh Layout Container -->
            <div class="feature-container">
                <h2>Fresh Layout</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="window.location.href='fresh-layout.html'">
                        <div class="feature-icon">🆕</div>
                        <h3>Fresh Tools</h3>
                        <p>Access a fresh blank three-button layout ready for new features</p>
                        <button class="feature-btn">Go to Fresh Layout</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
</body>
</html>
