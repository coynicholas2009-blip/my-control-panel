<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original Features - My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-header">
                <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
                <h1>⚡ Original Tools</h1>
            </div>
            <p>Your original three-button layout with full functionality</p>
        </header>
        
        <main>
            <div class="feature-container">
                <h2>Original Features</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="window.location.href='weather.html'">
                        <div class="feature-icon">🌤️</div>
                        <h3>Weather</h3>
                        <p>Check weather for cities around the world</p>
                        <button class="feature-btn">Go to Weather</button>
                    </div>
                    
                    <div class="feature-card" onclick="window.location.href='getnotes.html'">
                        <div class="feature-icon">📋</div>
                        <h3>Get Notes</h3>
                        <p>Retrieve your notes from the database</p>
                        <button class="feature-btn">Go to Get Notes</button>
                    </div>
                    
                    <div class="feature-card" onclick="window.location.href='history.html'">
                        <div class="feature-icon">📅</div>
                        <h3>Christian History</h3>
                        <p>Discover daily facts about Christian martyrs</p>
                        <button class="feature-btn">Go to History</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
</body>
</html>
