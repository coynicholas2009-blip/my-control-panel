<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Tools - My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-header">
                <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
                <h1>📝 Notes Tools</h1>
            </div>
            <p>Send and retrieve your notes</p>
        </header>
        
        <main>
            <div class="feature-container">
                <h2>Notes Features</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="window.location.href='notes.html'">
                        <div class="feature-icon">📝</div>
                        <h3>Send Notes</h3>
                        <p>Send your notes to the database</p>
                        <button class="feature-btn">Go to Send Notes</button>
                    </div>
                    
                    <div class="feature-card" onclick="window.location.href='getnotes.html'">
                        <div class="feature-icon">📋</div>
                        <h3>Get Notes</h3>
                        <p>Retrieve your notes from the database</p>
                        <button class="feature-btn">Go to Get Notes</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
</body>
</html>
