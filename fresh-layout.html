<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Layout - My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-header">
                <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
                <h1>🆕 Fresh Tools</h1>
            </div>
            <p>A fresh blank three-button layout ready for new features</p>
        </header>
        
        <main>
            <div class="feature-container">
                <h2>Fresh Features</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="alert('Fresh Button 1: Ready for assignment!')">
                        <div class="feature-icon">🔧</div>
                        <h3>Feature 1</h3>
                        <p>Ready for new functionality</p>
                        <button class="feature-btn">Use Feature 1</button>
                    </div>
                    
                    <div class="feature-card" onclick="alert('Fresh Button 2: Ready for assignment!')">
                        <div class="feature-icon">⚙️</div>
                        <h3>Feature 2</h3>
                        <p>Ready for new functionality</p>
                        <button class="feature-btn">Use Feature 2</button>
                    </div>
                    
                    <div class="feature-card" onclick="alert('Fresh Button 3: Ready for assignment!')">
                        <div class="feature-icon">🚀</div>
                        <h3>Feature 3</h3>
                        <p>Ready for new functionality</p>
                        <button class="feature-btn">Use Feature 3</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
</body>
</html>
