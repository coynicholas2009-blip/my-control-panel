<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎛️ My Control Panel</h1>
            <p>Choose a section to get started</p>
        </header>
        
        <main>
            <!-- Notes Container -->
            <div class="feature-container">
                <h2>Notes</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="window.location.href='notes-page.html'">
                        <div class="feature-icon">📝</div>
                        <h3>Notes Tools</h3>
                        <p>Access your send and get notes functionality</p>
                        <button class="feature-btn">Go to Notes</button>
                    </div>
                </div>
            </div>
            
            <!-- New Page Container -->
            <div class="feature-container">
                <h2>New Features</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="window.location.href='new-page.html'">
                        <div class="feature-icon">🆕</div>
                        <h3>New Tools</h3>
                        <p>Access new features and tools</p>
                        <button class="feature-btn">Go to New Page</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
</body>
</html>
