<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎛️ My Control Panel</h1>
            <p>Choose a section to get started</p>
        </header>
        
        <main>
            <!-- Existing Features Container -->
            <div class="feature-container">
                <h2>Existing Features</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="window.location.href='existing-features.html'">
                        <div class="feature-icon">⚡</div>
                        <h3>Current Tools</h3>
                        <p>Access all your existing features and tools</p>
                        <button class="feature-btn">Go to Existing Features</button>
                    </div>
                </div>
            </div>
            
            <!-- Experiment Container -->
            <div class="feature-container">
                <h2>Experimentation</h2>
                <div class="feature-grid">
                    <div class="feature-card" onclick="window.location.href='experiment.html'">
                        <div class="feature-icon">🧪</div>
                        <h3>Lab Space</h3>
                        <p>Experiment with new features and ideas</p>
                        <button class="feature-btn">Go to Experiment</button>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 My Control Panel</p>
        </footer>
    </div>
</body>
</html>
